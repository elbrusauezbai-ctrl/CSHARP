<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Pro | IT Test Platform</title>
    <style>
:root {
    --bg: #f8fafc;
    --primary: #2563eb;
    --white: #ffffff;
    --text: #1e293b;
    --success: #22c55e;
    --error: #ef4444;
    --shadow: 0 10px 25px rgba(0,0,0,0.05);
}

body {
    margin: 0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    background-color: var(--bg);
    color: var(--text);
}

.app-container {
    max-width: 600px;
    margin: 40px auto;
    padding: 20px;
}

.hidden { display: none; }

.screen {
    animation: slideUp 0.4s ease-out;
}

@keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

header { text-align: center; margin-bottom: 40px; }
header h1 { color: var(--primary); font-size: 3rem; letter-spacing: -1px; margin: 0; }
header p { color: #64748b; margin-top: 5px; }

.menu-card, .result-card {
    background: var(--white);
    padding: 40px;
    border-radius: 24px;
    box-shadow: var(--shadow);
}

.grid-menu {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-top: 30px;
}

button {
    padding: 16px;
    border: none;
    border-radius: 16px;
    background: var(--primary);
    color: white;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
}

button:hover {
    filter: brightness(1.1);
    transform: translateY(-2px);
}

.option-item {
    background: var(--white);
    padding: 20px;
    border-radius: 16px;
    border: 2px solid #e2e8f0;
    cursor: pointer;
    transition: 0.2s;
}

.option-item:hover { border-color: var(--primary); background: #f1f5f9; }
.correct { background: var(--success) !important; color: white; border-color: var(--success); }
.wrong { background: var(--error) !important; color: white; border-color: var(--error); }
</style>
</head>
<body>
<div class="app-container">
    <div id="home-screen" class="screen">
        <header>
                <h1>QUIZ PRO</h1>
                <p>Кәсіби деңгейдегі білім тексеру жүйесі</p>
            </header>
        <div class="menu-card"><h3>Тест блогын таңдаңыз:</h3><div class="grid-menu" id="block-list"></div></div>
    </div>
    <div id="quiz-screen" class="screen hidden">
        <div class="quiz-header"><span id="progress-text">Сұрақ: 1/50</span><div class="progress-bar"><div id="bar-fill"></div></div></div>
        <div id="question-box"><h2 id="q-text"></h2><div id="options-list" class="options-grid"></div></div>
        <div class="quiz-footer"><button id="next-btn" class="hidden" onclick="loadNextQuestion()">Келесі сұрақ</button></div>
    </div>
    <div id="result-screen" class="screen hidden">
        <div class="result-card"><h2>Тест аяқталды!</h2><div class="score-circle"><span id="final-score">0</span></div><p id="result-message">Жақсы нәтиже!</p><button onclick="restartQuiz()">Басты мәзірге оралу</button></div>
    </div>
</div>
<script>

;", "Console.Read();", "Console.ReadLine(),", "WriteLine();", "Console.Write();"]}, {"id": 14, "question": "С# тілінде консольді енгізу операторларын көрсетіңіз", "correct": "Console.ReadLine()", "variants": ["Console.ReadLine()", "Console.WriteLine();", "Console();", "Read();", "Console.Write();"]}, {"id": 15, "question": "С# тілінде консольді енгізу операторлары", "correct": "Console.Read()", "variants": ["Console.Write()", "Console.WriteLine()", "Console.Read()", "Write();", "ReadLine()"]}, {"id": 16, "question": "Кластың немесе құрылымның жалпы құрамдас бөлігі:", "correct": "қоғамдық", "variants": ["жеке", "қорғалған", "қоғамдық", "статикалық", "ішкі"]}, {"id": 17, "question": "Уақыттың бір мезетінде нысан мыналармен сипатталады:", "correct": "Қасиеттер", "variants": ["Атауы", "Қасиеттер", "Айнымалылар", "Оқиғалар", "Сынып"]}, {"id": 18, "question": "Төмендегілердің қайсысы көрсеткіштер массивіне жатады?", "correct": "int*[4] p;", "variants": ["int p[4];", "int (*)p;", "int *p;", "int*[4] p;", "int p"]}, {"id": 19, "question": "Берілген көрсеткіштің қайсысын арттыруға болмайды?", "correct": "void", "variants": ["string", "char", "int", "float", "void"]}, {"id": 20, "question": "Жолдан бос орынды жою үшін қолданылатын әдіс", "correct": "Trim()", "variants": ["Trim()", "Split()", "Start()", "Substring()", "TrimStart()"]}, {"id": 21, "question": "Келесі мәліметтер үшін логикалық өрнектердің қайсысы жалған болады: int a=5, k=2, m=7, n=4;", "correct": "a<k || m<n", "variants": ["a<n && m>k", "a<k || m<n", "a<k || m>n", "a>k || m>n", "a>k && m>n"]}, {"id": 22, "question": "String класының осы әдістерінің қайсысы String нысанының ұзындығын алу үшін қолданылады?", "correct": "Length()", "variants": ["Lengthof()", "Sizeof()", "String", "алу()", "Length()"]}, {"id": 23, "question": "«?:» операторы:", "correct": "тернарлық оператор", "variants": ["сұрақ белгісі", "бүтін санға бөлу", "тура оператор", "тернарлық оператор", "Қосу"]}, {"id": 24, "question": "Айнымалылардың бүт const BLOCK_SIZE = 50;
    const TOTAL_BLOCKS = Math.ceil(quizData.length / BLOCK_SIZE);
    let currentQuestions = [];
    let currentIndex = 0;
    let score = 0;
    let userAnswers = [];

    function buildBlockButtons() {
        const container = document.getElementById('block-list');
        container.innerHTML = '';
        for (let i = 0; i < TOTAL_BLOCKS; i++) {
            const start = i * BLOCK_SIZE + 1;
            const end = Math.min((i+1)*BLOCK_SIZE, quizData.length);
            const btn = document.createElement('button');
            btn.textContent = `${start} - ${end}`;
            btn.onclick = () => initQuiz(i);
            container.appendChild(btn);
        }
    }

    function initQuiz(blockIdx) {
        const start = blockIdx * BLOCK_SIZE;
        const end = Math.min(start + BLOCK_SIZE, quizData.length);
        currentQuestions = [];
        for (let i = start; i < end; i++) {
            const q = quizData[i];
            const shuffledVariants = [...q.variants].sort(() => Math.random() - 0.5);
            currentQuestions.push({
                id: q.id,
                text: q.question,
                correct: q.correct,
                variants: shuffledVariants
            });
        }
        currentIndex = 0;
        score = 0;
        userAnswers = new Array(currentQuestions.length).fill(null);
        document.getElementById('home-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        document.getElementById('result-screen').classList.add('hidden');
        showQuestion();
    }

    function showQuestion() {
        const q = currentQuestions[currentIndex];
        document.getElementById('q-text').innerText = q.text;
        document.getElementById('progress-text').innerText = `Сұрақ: ${currentIndex+1}/${currentQuestions.length}`;
        const percent = ((currentIndex+1) / currentQuestions.length) * 100;
        document.getElementById('bar-fill').style.width = `${percent}%`;
        
        const container = document.getElementById('options-list');
        container.innerHTML = '';
        const saved = userAnswers[currentIndex];
        
        q.variants.forEach(opt => {
            const div = document.createElement('div');
            div.className = 'option-item';
            div.innerText = opt;
            if (saved !== null) {
                if (opt === q.correct) div.classList.add('correct');
                else if (opt === saved) div.classList.add('wrong');
                div.style.pointerEvents = 'none';
            } else {
                div.onclick = () => checkAnswer(div, opt, q.correct);
            }
            container.appendChild(div);
        });
        
        const nextBtn = document.getElementById('next-btn');
        if (saved !== null) nextBtn.classList.remove('hidden');
        else nextBtn.classList.add('hidden');
    }

    function checkAnswer(element, selected, correct) {
        const allOptions = document.querySelectorAll('.option-item');
        allOptions.forEach(el => el.style.pointerEvents = 'none');
        if (selected === correct) {
            element.classList.add('correct');
            score++;
        } else {
            element.classList.add('wrong');
            allOptions.forEach(el => {
                if (el.innerText === correct) el.classList.add('correct');
            });
        }
        userAnswers[currentIndex] = selected;
        document.getElementById('next-btn').classList.remove('hidden');
    }

    function loadNextQuestion() {
        if (currentIndex + 1 < currentQuestions.length) {
            currentIndex++;
            showQuestion();
        } else {
            showResults();
        }
    }

    function showResults() {
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('final-score').innerText = `${score}/${currentQuestions.length}`;
        let percent = (score / currentQuestions.length) * 100;
        let msg = "";
        if (percent >= 90) msg = "Тамаша! Сіз нағыз мамансыз! 🎉";
        else if (percent >= 70) msg = "Жақсы нәтиже! Бірақ әлі де дамуға орын бар 💪";
        else if (percent >= 50) msg = "Қанағаттанарлық. Қайталап көріңіз 📚";
        else msg = "Көбірек дайындалыңыз. Бұл сіздің деңгейіңіз емес 😢";
        document.getElementById('result-message').innerText = msg;
    }

    function restartQuiz() {
        document.getElementById('result-screen').classList.add('hidden');
        document.getElementById('home-screen').classList.remove('hidden');
    }

    buildBlockButtons();
</script>
